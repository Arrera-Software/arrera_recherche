{% extends "simple/base.html" %}
{% from 'simple/icons.html' import icon_big %}
{% block content %}
<div class="index custom-home">
    <div class="brand-container">
        <div class="logo-title">
            <span class="logo-word"><span class="logo-blue">A</span><span class="logo-black">RRERA</span></span>
            <span class="logo-word"><span class="logo-blue">R</span><span class="logo-black">ECHERCHE</span></span>
        </div>
        <p class="powered-by">powered by SearXNG</p>
    </div>
    {% include 'simple/simple_search.html' %}
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap');

/* Force native background, limit to full viewport height, and block scrollbars */
body.index_endpoint {
    background: var(--color-base-background) !important;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh !important;
    width: 100vw !important;
    overflow: hidden !important;
    box-sizing: border-box;
}

body.index_endpoint #main_index {
    margin-top: 0 !important; /* Override default 26vh margin-top */
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    padding: 20px;
    box-sizing: border-box;
    background: var(--color-base-background) !important;
    border: none !important;
    box-shadow: none !important;
    overflow: hidden !important;
}

/* Hide default title */
.index .title {
    display: none !important;
}

/* Top Right Navigation */
body.index_endpoint #links_on_top {
    position: absolute;
    top: 24px;
    right: 24px;
    display: flex;
    gap: 24px;
    margin: 0;
    padding: 0;
}

body.index_endpoint #links_on_top a {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--color-base-font) !important;
    text-decoration: none !important;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.2s;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body.index_endpoint #links_on_top a:hover {
    opacity: 0.7;
}

body.index_endpoint #links_on_top a svg.sxng-icon-set-big {
    width: 18px;
    height: 18px;
    margin: 0;
    fill: currentColor;
    stroke: currentColor;
}

/* Custom home wrapper */
.custom-home {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 650px;
    margin-top: -40px; /* Shift slightly up for balance */
    animation: fadeIn 0.8s ease-out;
}

/* Brand Logo Text Style */
.brand-container {
    display: flex;
    flex-direction: column;
    align-items: flex-start; /* Aligns "powered by" with start of logo text */
    margin-bottom: 2.5rem;
    width: 100%;
}

.logo-title {
    visibility: visible !important;
    display: flex !important;
    align-items: baseline !important;
    flex-wrap: wrap !important;
    gap: 0 20px !important;
    line-height: 1 !important;
    margin: 0;
    padding: 0;
    font-family: 'Roboto Flex', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.logo-word {
    display: inline-flex !important;
    align-items: baseline !important;
}

.logo-blue {
    visibility: visible !important;
    display: inline !important;
    color: #0024f3 !important;
    font-size: 6.5rem !important;
    font-weight: 900 !important;
}

html.theme-dark .logo-blue,
html.theme-black .logo-blue {
    color: #0024f3 !important;
}

@media (prefers-color-scheme: dark) {
    html.theme-auto .logo-blue {
        color: #0024f3 !important;
    }
}

.logo-black {
    visibility: visible !important;
    display: inline !important;
    color: #000000 !important;
    font-size: 4.0rem !important;
    font-weight: 800 !important;
    letter-spacing: -1.5px !important;
}

html.theme-dark .logo-black,
html.theme-black .logo-black {
    color: #ffffff !important;
}

@media (prefers-color-scheme: dark) {
    html.theme-auto .logo-black {
        color: #ffffff !important;
    }
}

.powered-by {
    visibility: visible !important;
    display: block !important;
    color: #487cff !important;
    font-size: 1.25rem !important;
    font-weight: 700 !important;
    margin-top: 0.2rem;
    margin-bottom: 0;
    margin-left: 0.2rem;
    font-family: 'Roboto Flex', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

html.theme-dark .powered-by,
html.theme-black .powered-by {
    color: #487cff !important;
}

@media (prefers-color-scheme: dark) {
    html.theme-auto .powered-by {
        color: #487cff !important;
    }
}

/* Responsive design for smaller screens */
@media (max-width: 600px) {
    .logo-title {
        flex-direction: row !important;
        flex-wrap: nowrap !important;
        align-items: baseline !important;
        justify-content: flex-start !important;
        gap: 0 2vw !important;
    }
    
    .logo-blue {
        font-size: 12.5vw !important;
    }
    
    .logo-black {
        font-size: 7.7vw !important;
    }
    
    .powered-by {
        font-size: 2.8vw !important;
        margin-top: 0.5vw !important;
    }
    
    .custom-home {
        margin-top: -20px !important;
    }
}

/* Search form and field overrides */
.custom-home #search {
    width: 100%;
    margin: 0;
}

body.index_endpoint #search,
body.index_endpoint #search_header,
body.index_endpoint #search_view {
    position: static !important; /* Prevent jumping to top on mobile focus */
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
    border-bottom: none !important; /* Force hide bottom border line */
    box-shadow: none !important;
}

.custom-home .search_box {
    display: flex;
    align-items: center;
    position: relative;
    width: 100%;
    height: 48px;
    background: var(--color-search-background) !important;
    border: 1px solid var(--color-search-border) !important;
    border-radius: 24px !important;
    padding: 0 16px !important;
    box-sizing: border-box !important;
    box-shadow: var(--color-search-shadow) !important;
    transition: box-shadow 0.2s, border-color 0.2s;
}

.custom-home .search_box:focus-within {
    border-color: var(--color-search-border) !important;
    box-shadow: var(--color-search-shadow) !important;
}

.custom-home #q {
    flex: 1;
    height: 100%;
    border: none !important;
    outline: none !important;
    background: transparent !important;
    font-size: 16px !important;
    color: var(--color-search-font) !important;
    padding: 0 8px 0 8px !important;
    box-sizing: border-box;
    box-shadow: none !important;
}

.custom-home #q::placeholder {
    color: #999999 !important;
}

.custom-home #send_search {
    background: transparent !important;
    border: none !important;
    padding: 8px !important;
    margin: 0 !important;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-search-font) !important;
    order: 2;
}

.custom-home #send_search svg {
    width: 20px;
    height: 20px;
    fill: currentColor !important;
    stroke: currentColor !important;
}

.custom-home #clear_search {
    background: transparent !important;
    border: none !important;
    padding: 8px !important;
    margin: 0 !important;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-search-font) !important;
    order: 1;
}

.custom-home #clear_search svg {
    width: 18px;
    height: 18px;
    fill: currentColor !important;
}

/* Autocomplete styling */
.custom-home .autocomplete {
    position: absolute;
    top: calc(100% + 6px) !important;
    left: 0 !important;
    right: 0 !important;
    background: var(--color-autocomplete-background) !important;
    border-radius: 16px !important;
    z-index: 1000 !important;
    overflow: hidden;
    padding: 0 !important;
    margin: 0 !important;
    border: none !important;
    box-shadow: none !important;
}

.custom-home .autocomplete.open {
    border: 1px solid var(--color-autocomplete-border) !important;
    box-shadow: var(--color-autocomplete-shadow) !important;
}

.custom-home .autocomplete:empty {
    display: none !important;
    border: none !important;
    box-shadow: none !important;
}

/* Footer overrides */
body.index_endpoint footer {
    border-top: 1px solid var(--color-footer-border) !important;
    background: var(--color-footer-background) !important;
    padding: 16px 20px !important; /* Compact padding to avoid overflow */
    margin-top: auto;
    box-sizing: border-box;
    width: 100% !important;
}

body.index_endpoint footer p {
    text-align: center !important;
    font-size: 12px !important;
    color: var(--color-base-font) !important;
    line-height: 1.8 !important;
    margin: 0 !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body.index_endpoint footer a {
    color: var(--color-url-font) !important;
    text-decoration: none !important;
}

body.index_endpoint footer a:hover {
    text-decoration: underline !important;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var q = document.getElementById("q");
        if (q) {
            q.placeholder = "Rechercher...";
        }
    });
</script>
{% endblock %}
